<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>API 키 테스트</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-8">
        <h1 class="text-2xl font-bold mb-6">🔑 공공데이터 API 키 테스트</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block font-semibold mb-2">API 키 입력</label>
                <input type="text" id="apiKey" value="4b5c77bf08fd7db79ad9754d135838715e778724d0ff9800c2c2682513f72d32" class="w-full px-4 py-3 border rounded-lg font-mono text-sm">
            </div>
            
            <div>
                <label class="block font-semibold mb-2">기준년월 (YYYYMM)</label>
                <input type="text" id="baseYm" value="202601" class="w-full px-4 py-3 border rounded-lg">
            </div>
            
            <button onclick="testAPI()" class="w-full bg-cyan-600 text-white py-3 rounded-lg font-bold hover:bg-cyan-700">
                API 연결 테스트
            </button>
        </div>
        
        <div id="result" class="mt-6 hidden">
            <h2 class="font-bold mb-2">결과:</h2>
            <pre id="resultText" class="bg-gray-100 p-4 rounded-lg overflow-auto max-h-96 text-xs"></pre>
        </div>
        
        <div class="mt-6 p-4 bg-yellow-50 border-2 border-yellow-200 rounded-lg">
            <h3 class="font-bold text-yellow-800 mb-2">⚠️ API 키 확인 방법</h3>
            <ol class="text-sm text-yellow-700 space-y-1 list-decimal list-inside">
                <li><a href="https://data.go.kr" target="_blank" class="underline">공공데이터포털</a> 로그인</li>
                <li>마이페이지 → <strong>오픈API</strong> 메뉴</li>
                <li><strong>인증키 발급현황</strong> 클릭</li>
                <li><strong class="text-red-600">일반 인증키 (Decoding)</strong> 복사 (Encoding 아님!)</li>
            </ol>
        </div>
    </div>
    
    <script>
        async function testAPI() {
            const apiKey = document.getElementById('apiKey').value;
            const baseYm = document.getElementById('baseYm').value;
            
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('resultText');
            
            resultDiv.classList.remove('hidden');
            resultText.textContent = '⏳ API 호출 중...';
            
            try {
                // URL에 직접 serviceKey 포함
                const url = `https://apis.data.go.kr/1160100/service/GetLifeInsuCompInfoService/getLifeInsuCompGeneInfo?serviceKey=${apiKey}&numOfRows=10&pageNo=1&resultType=json&basYm=${baseYm}`;
                
                console.log('API URL:', url);
                
                const response = await fetch(url);
                const text = await response.text();
                
                console.log('Response status:', response.status);
                console.log('Response text:', text);
                
                resultText.textContent = `Status: ${response.status}\n\n${text}`;
                
                // JSON 파싱 시도
                try {
                    const data = JSON.parse(text);
                    resultText.textContent = JSON.stringify(data, null, 2);
                    
                    if (data.response?.header?.resultCode === '00') {
                        alert('✅ API 연결 성공!');
                    } else {
                        alert('❌ API 오류: ' + (data.response?.header?.resultMsg || '알 수 없는 오류'));
                    }
                } catch (e) {
                    // JSON이 아닌 경우
                    if (text.includes('Unauthorized')) {
                        alert('❌ API 키 인증 실패!\n\n공공데이터포털에서 "일반 인증키 (Decoding)"을 확인해주세요.');
                    } else if (text.includes('SERVICE_KEY_IS_NOT_REGISTERED_ERROR')) {
                        alert('❌ API 키가 등록되지 않음!\n\n활용신청을 완료했는지 확인해주세요.');
                    } else {
                        alert('❌ 응답 파싱 실패: ' + text);
                    }
                }
            } catch (error) {
                resultText.textContent = 'Error: ' + error.message;
                alert('❌ 네트워크 오류: ' + error.message);
            }
        }
        
        // 페이지 로드 시 자동 테스트
        window.addEventListener('load', () => {
            console.log('페이지 로드됨');
        });
    </script>
</body>
</html>
