<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보험료 계산기 - 보험 LOUNGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans KR', -apple-system, sans-serif; }
        .coverage-item { transition: all 0.2s; }
        .coverage-item:hover { background: #f0f9ff; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- 간단한 헤더 -->
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <a href="index.html" class="text-2xl font-bold text-cyan-600">보험 LOUNGE</a>
                <a href="insurance-tools.html" class="text-gray-600 hover:text-cyan-600">← 돌아가기</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8 text-center">보험료 정확 계산기</h1>

        <!-- Step 1: 상품 선택 -->
        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                <span class="bg-cyan-600 text-white w-10 h-10 rounded-full flex items-center justify-center">1</span>
                보험 상품 선택
            </h2>
            
            <div class="grid md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">보험사</label>
                    <select id="company" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-cyan-500">
                        <option value="">선택하세요</option>
                        <option value="samsung">삼성생명</option>
                        <option value="nh">NH농협생명</option>
                        <option value="kb">KB생명</option>
                        <option value="hanwha">한화생명</option>
                        <option value="kyobo">교보생명</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">상품</label>
                    <select id="product" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-cyan-500" disabled>
                        <option value="">보험사를 먼저 선택하세요</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">납입 기간</label>
                    <select id="payment-period" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-cyan-500" disabled>
                        <option value="">상품을 먼저 선택하세요</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Step 2: 가입자 정보 -->
        <div class="bg-white rounded-2xl shadow-xl p-8 mb-6">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                <span class="bg-cyan-600 text-white w-10 h-10 rounded-full flex items-center justify-center">2</span>
                가입자 정보
            </h2>
            
            <div class="grid md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-2">나이</label>
                    <input type="number" id="age" min="20" max="70" value="35" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-cyan-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">성별</label>
                    <select id="gender" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-cyan-500">
                        <option value="male">남성</option>
                        <option value="female">여성</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">흡연 여부</label>
                    <select id="smoking" class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-cyan-500">
                        <option value="no">비흡연</option>
                        <option value="yes">흡연</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Step 3: 담보 선택 -->
        <div id="coverage-section" class="bg-white rounded-2xl shadow-xl p-8 mb-6 hidden">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-3">
                <span class="bg-cyan-600 text-white w-10 h-10 rounded-full flex items-center justify-center">3</span>
                담보 및 가입금액 선택
            </h2>
            
            <div id="coverage-list" class="space-y-4">
                <!-- JavaScript로 동적 생성 -->
            </div>
        </div>

        <!-- 계산 버튼 -->
        <div class="text-center mb-6">
            <button onclick="calculatePremium()" class="bg-gradient-to-r from-cyan-600 to-blue-600 text-white px-12 py-4 rounded-xl font-bold text-lg hover:shadow-2xl transition transform hover:scale-105">
                <i class="fas fa-calculator mr-2"></i>보험료 계산하기
            </button>
        </div>

        <!-- 결과 -->
        <div id="result-section" class="bg-white rounded-2xl shadow-xl p-8 hidden">
            <h2 class="text-2xl font-bold mb-6 text-center">계산 결과</h2>
            
            <div class="grid md:grid-cols-3 gap-6 mb-8">
                <div class="bg-gradient-to-br from-cyan-50 to-blue-50 rounded-xl p-6 border-2 border-cyan-200 text-center">
                    <div class="text-sm text-gray-600 mb-2">월 보험료</div>
                    <div class="text-4xl font-bold text-cyan-600" id="monthly-premium">-</div>
                </div>
                <div class="bg-gradient-to-br from-purple-50 to-pink-50 rounded-xl p-6 border-2 border-purple-200 text-center">
                    <div class="text-sm text-gray-600 mb-2">연간 보험료</div>
                    <div class="text-4xl font-bold text-purple-600" id="yearly-premium">-</div>
                </div>
                <div class="bg-gradient-to-br from-orange-50 to-red-50 rounded-xl p-6 border-2 border-orange-200 text-center">
                    <div class="text-sm text-gray-600 mb-2">총 납입액</div>
                    <div class="text-4xl font-bold text-orange-600" id="total-premium">-</div>
                </div>
            </div>

            <!-- 담보별 세부 내역 -->
            <div class="bg-gray-50 rounded-xl p-6">
                <h3 class="font-bold mb-4 text-lg">담보별 보험료 세부 내역</h3>
                <div id="coverage-detail" class="space-y-2">
                    <!-- JavaScript로 동적 생성 -->
                </div>
            </div>
        </div>
    </div>

    <script>
        // 상품 데이터 (실제 상품 기반)
        const productData = {
            samsung: {
                name: '삼성생명',
                products: {
                    champion: {
                        name: '삼성챔피온종신보험',
                        periods: [10, 15, 20, 30],
                        coverages: [
                            { id: 'main', name: '주계약 (사망보장)', required: true, minAmount: 10000, maxAmount: 100000, step: 10000, baseRate: 1.53 },
                            { id: 'cancer', name: '암진단비', required: false, minAmount: 1000, maxAmount: 10000, step: 1000, baseRate: 0.72 },
                            { id: 'ci', name: '3대질병진단비', required: false, minAmount: 1000, maxAmount: 5000, step: 1000, baseRate: 1.25 },
                            { id: 'surgery', name: '수술비', required: false, minAmount: 100, maxAmount: 1000, step: 100, baseRate: 0.35 }
                        ]
                    }
                }
            },
            nh: {
                name: 'NH농협생명',
                products: {
                    twostep: {
                        name: '투스텝NH종신보험',
                        periods: [10, 15, 20],
                        coverages: [
                            { id: 'main', name: '주계약 (사망보장)', required: true, minAmount: 10000, maxAmount: 100000, step: 10000, baseRate: 1.45 },
                            { id: 'cancer', name: '암진단비', required: false, minAmount: 1000, maxAmount: 10000, step: 1000, baseRate: 0.68 },
                            { id: 'hospital', name: '입원일당', required: false, minAmount: 10, maxAmount: 100, step: 10, baseRate: 0.42 }
                        ]
                    }
                }
            },
            kb: {
                name: 'KB생명',
                products: {
                    heritage: {
                        name: 'KB상속종신보험',
                        periods: [10, 15, 20, 25],
                        coverages: [
                            { id: 'main', name: '주계약 (사망보장)', required: true, minAmount: 10000, maxAmount: 200000, step: 10000, baseRate: 1.48 },
                            { id: 'cancer', name: '암진단비', required: false, minAmount: 1000, maxAmount: 10000, step: 1000, baseRate: 0.70 }
                        ]
                    }
                }
            },
            hanwha: {
                name: '한화생명',
                products: {
                    heritage: {
                        name: '한화상속종신보험',
                        periods: [10, 15, 20, 30],
                        coverages: [
                            { id: 'main', name: '주계약 (사망보장)', required: true, minAmount: 10000, maxAmount: 150000, step: 10000, baseRate: 1.55 },
                            { id: 'cancer', name: '암진단비', required: false, minAmount: 1000, maxAmount: 10000, step: 1000, baseRate: 0.74 },
                            { id: 'ci', name: '3대질병진단비', required: false, minAmount: 1000, maxAmount: 5000, step: 1000, baseRate: 1.28 }
                        ]
                    }
                }
            },
            kyobo: {
                name: '교보생명',
                products: {
                    nodividend: {
                        name: '교보무배당종신보험',
                        periods: [10, 15, 20],
                        coverages: [
                            { id: 'main', name: '주계약 (사망보장)', required: true, minAmount: 10000, maxAmount: 50000, step: 10000, baseRate: 1.38 },
                            { id: 'cancer', name: '암진단비', required: false, minAmount: 1000, maxAmount: 10000, step: 1000, baseRate: 0.66 }
                        ]
                    }
                }
            }
        };

        let selectedProduct = null;

        // 보험사 선택 시
        document.getElementById('company').addEventListener('change', function() {
            const company = this.value;
            const productSelect = document.getElementById('product');
            productSelect.innerHTML = '<option value="">선택하세요</option>';
            
            if (company && productData[company]) {
                Object.keys(productData[company].products).forEach(key => {
                    const product = productData[company].products[key];
                    productSelect.innerHTML += `<option value="${key}">${product.name}</option>`;
                });
                productSelect.disabled = false;
            } else {
                productSelect.disabled = true;
            }
            
            document.getElementById('payment-period').disabled = true;
            document.getElementById('coverage-section').classList.add('hidden');
        });

        // 상품 선택 시
        document.getElementById('product').addEventListener('change', function() {
            const company = document.getElementById('company').value;
            const productKey = this.value;
            const periodSelect = document.getElementById('payment-period');
            
            if (company && productKey && productData[company].products[productKey]) {
                selectedProduct = productData[company].products[productKey];
                
                periodSelect.innerHTML = '<option value="">선택하세요</option>';
                selectedProduct.periods.forEach(period => {
                    periodSelect.innerHTML += `<option value="${period}">${period}년</option>`;
                });
                periodSelect.disabled = false;
                
                // 담보 리스트 생성
                renderCoverages();
                document.getElementById('coverage-section').classList.remove('hidden');
            } else {
                periodSelect.disabled = true;
                document.getElementById('coverage-section').classList.add('hidden');
            }
        });

        // 담보 리스트 렌더링
        function renderCoverages() {
            if (!selectedProduct) return;
            
            const container = document.getElementById('coverage-list');
            container.innerHTML = '';
            
            selectedProduct.coverages.forEach((coverage, index) => {
                const required = coverage.required ? '<span class="text-red-600 ml-2">(필수)</span>' : '';
                const checked = coverage.required ? 'checked' : '';
                const disabled = coverage.required ? 'disabled' : '';
                
                container.innerHTML += `
                    <div class="coverage-item border-2 rounded-xl p-6 ${coverage.required ? 'border-cyan-300 bg-cyan-50' : 'border-gray-200'}">
                        <div class="flex items-center justify-between mb-4">
                            <label class="flex items-center gap-3 font-bold text-lg cursor-pointer">
                                <input type="checkbox" id="coverage-${coverage.id}" class="w-5 h-5" ${checked} ${disabled} onchange="toggleCoverage('${coverage.id}')">
                                ${coverage.name}${required}
                            </label>
                        </div>
                        <div id="amount-${coverage.id}" class="${coverage.required ? '' : 'hidden'}">
                            <label class="block text-sm font-semibold mb-2">가입금액 (만원)</label>
                            <div class="flex items-center gap-4">
                                <input type="range" id="slider-${coverage.id}" 
                                    min="${coverage.minAmount}" 
                                    max="${coverage.maxAmount}" 
                                    step="${coverage.step}" 
                                    value="${coverage.minAmount}" 
                                    class="flex-1"
                                    oninput="updateAmount('${coverage.id}')">
                                <input type="number" id="input-${coverage.id}" 
                                    min="${coverage.minAmount}" 
                                    max="${coverage.maxAmount}" 
                                    step="${coverage.step}" 
                                    value="${coverage.minAmount}" 
                                    class="w-32 px-3 py-2 border rounded-lg text-right font-bold"
                                    oninput="updateSlider('${coverage.id}')">
                                <span class="text-gray-600 font-semibold">만원</span>
                            </div>
                            <div class="text-xs text-gray-500 mt-2">
                                ${coverage.minAmount.toLocaleString()} ~ ${coverage.maxAmount.toLocaleString()} 만원 (${coverage.step.toLocaleString()}만원 단위)
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 담보 선택 토글
        function toggleCoverage(coverageId) {
            const checkbox = document.getElementById(`coverage-${coverageId}`);
            const amountDiv = document.getElementById(`amount-${coverageId}`);
            
            if (checkbox.checked) {
                amountDiv.classList.remove('hidden');
            } else {
                amountDiv.classList.add('hidden');
            }
        }

        // 슬라이더 값 업데이트
        function updateAmount(coverageId) {
            const slider = document.getElementById(`slider-${coverageId}`);
            const input = document.getElementById(`input-${coverageId}`);
            input.value = slider.value;
        }

        // 입력값으로 슬라이더 업데이트
        function updateSlider(coverageId) {
            const slider = document.getElementById(`slider-${coverageId}`);
            const input = document.getElementById(`input-${coverageId}`);
            slider.value = input.value;
        }

        // 보험료 계산
        function calculatePremium() {
            if (!selectedProduct) {
                alert('상품을 선택해주세요.');
                return;
            }
            
            const period = parseInt(document.getElementById('payment-period').value);
            if (!period) {
                alert('납입기간을 선택해주세요.');
                return;
            }
            
            const age = parseInt(document.getElementById('age').value);
            const gender = document.getElementById('gender').value;
            const smoking = document.getElementById('smoking').value;
            
            let monthlyTotal = 0;
            const details = [];
            
            selectedProduct.coverages.forEach(coverage => {
                const checkbox = document.getElementById(`coverage-${coverage.id}`);
                if (checkbox && checkbox.checked) {
                    const amount = parseInt(document.getElementById(`input-${coverage.id}`).value);
                    
                    // 보험료 계산
                    let premium = (amount / 10000) * coverage.baseRate * 10000;
                    
                    // 나이 조정 (35세 기준, ±1세당 ±2%)
                    premium *= (1 + (age - 35) * 0.02);
                    
                    // 성별 조정 (여성 -5%)
                    if (gender === 'female') premium *= 0.95;
                    
                    // 흡연 조정 (흡연 +10%)
                    if (smoking === 'yes') premium *= 1.10;
                    
                    // 납입기간 조정
                    if (period === 10) premium *= 1.6;
                    else if (period === 15) premium *= 1.3;
                    else if (period === 20) premium *= 1.0;
                    else if (period === 25) premium *= 0.85;
                    else if (period === 30) premium *= 0.75;
                    
                    premium = Math.floor(premium / 100) * 100;
                    monthlyTotal += premium;
                    
                    details.push({
                        name: coverage.name,
                        amount: amount,
                        premium: premium
                    });
                }
            });
            
            if (monthlyTotal === 0) {
                alert('최소 1개 이상의 담보를 선택해주세요.');
                return;
            }
            
            const yearly = monthlyTotal * 12;
            const total = yearly * period;
            
            // 결과 표시
            document.getElementById('monthly-premium').textContent = monthlyTotal.toLocaleString() + '원';
            document.getElementById('yearly-premium').textContent = yearly.toLocaleString() + '원';
            document.getElementById('total-premium').textContent = total.toLocaleString() + '원';
            
            // 세부 내역
            const detailContainer = document.getElementById('coverage-detail');
            detailContainer.innerHTML = '';
            details.forEach(item => {
                detailContainer.innerHTML += `
                    <div class="flex justify-between items-center py-3 border-b">
                        <div>
                            <div class="font-semibold">${item.name}</div>
                            <div class="text-sm text-gray-600">가입금액: ${item.amount.toLocaleString()}만원</div>
                        </div>
                        <div class="text-right">
                            <div class="font-bold text-lg">${item.premium.toLocaleString()}원</div>
                            <div class="text-xs text-gray-500">월 보험료</div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('result-section').classList.remove('hidden');
            document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
