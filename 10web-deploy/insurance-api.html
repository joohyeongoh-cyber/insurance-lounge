<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보험 통계 API 연동 - 보험 LOUNGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">공공데이터포털 보험 통계 API 연동</h1>
        
        <!-- API 키 입력 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">1단계: API 키 입력</h2>
            <div class="space-y-4">
                <div>
                    <label class="block font-semibold mb-2">공공데이터포털 API 키 (Decoding)</label>
                    <input type="text" id="api-key" placeholder="여기에 API 키를 입력하세요" class="w-full px-4 py-3 border rounded-lg">
                    <p class="text-xs text-gray-500 mt-1">
                        발급 방법: <a href="https://data.go.kr" target="_blank" class="text-cyan-600 underline">data.go.kr</a> → 회원가입 → "금융위원회 생명보험" 검색 → 활용신청
                    </p>
                </div>
                <button onclick="testAPI()" class="bg-cyan-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-cyan-700">
                    API 연결 테스트
                </button>
            </div>
        </div>

        <!-- 생명보험사 목록 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">2단계: 생명보험사 목록 조회</h2>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block font-semibold mb-2">기준년월 (YYYYMM)</label>
                        <input type="text" id="base-year-month" value="202601" placeholder="202601" class="w-full px-4 py-3 border rounded-lg">
                    </div>
                    <div class="flex items-end">
                        <button onclick="getLifeInsuranceList()" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700 w-full">
                            생명보험사 목록 조회
                        </button>
                    </div>
                </div>
                <div id="life-insurance-result" class="mt-4">
                    <!-- 결과 표시 -->
                </div>
            </div>
        </div>

        <!-- 실손보험 통계 -->
        <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">3단계: 실손보험 통계 조회</h2>
            <div class="space-y-4">
                <button onclick="getMedicalInsuranceStats()" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700">
                    실손보험 통계 조회
                </button>
                <div id="medical-insurance-result" class="mt-4">
                    <!-- 결과 표시 -->
                </div>
            </div>
        </div>

        <!-- 결과 -->
        <div class="bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-xl font-bold mb-4">API 응답 결과</h2>
            <pre id="api-response" class="bg-gray-100 p-4 rounded-lg overflow-auto max-h-96 text-xs"></pre>
        </div>
    </div>

    <script>
        // API 연결 테스트
        async function testAPI() {
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) {
                alert('API 키를 입력해주세요!');
                return;
            }

            try {
                // 생명보험사 일반현황 조회 (테스트)
                const url = `https://apis.data.go.kr/1160100/service/GetLifeInsuCompInfoService/getLifeInsuCompGeneInfo?serviceKey=${encodeURIComponent(apiKey)}&numOfRows=10&pageNo=1&resultType=json`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById('api-response').textContent = JSON.stringify(data, null, 2);
                
                if (data.response && data.response.header.resultCode === '00') {
                    alert('✅ API 연결 성공!');
                } else {
                    alert('❌ API 연결 실패: ' + (data.response?.header?.resultMsg || '알 수 없는 오류'));
                }
            } catch (error) {
                alert('❌ 네트워크 오류: ' + error.message);
                document.getElementById('api-response').textContent = error.message;
            }
        }

        // 생명보험사 목록 조회
        async function getLifeInsuranceList() {
            const apiKey = document.getElementById('api-key').value;
            const baseYm = document.getElementById('base-year-month').value;
            
            if (!apiKey) {
                alert('API 키를 입력해주세요!');
                return;
            }

            try {
                const url = `https://apis.data.go.kr/1160100/service/GetLifeInsuCompInfoService/getLifeInsuCompGeneInfo?serviceKey=${encodeURIComponent(apiKey)}&numOfRows=100&pageNo=1&resultType=json&basYm=${baseYm}`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById('api-response').textContent = JSON.stringify(data, null, 2);
                
                if (data.response && data.response.body && data.response.body.items) {
                    const items = data.response.body.items.item;
                    let html = '<div class="space-y-2">';
                    
                    // 보험사별로 그룹화
                    const companies = {};
                    items.forEach(item => {
                        if (!companies[item.fncoNm]) {
                            companies[item.fncoNm] = [];
                        }
                        companies[item.fncoNm].push(item);
                    });
                    
                    // 보험사 목록 표시
                    for (const [company, data] of Object.entries(companies)) {
                        html += `<div class="border rounded-lg p-3">
                            <div class="font-bold">${company}</div>
                            <div class="text-sm text-gray-600 mt-1">
                                ${data.map(d => `${d.xcsmPlnpnDcdNm}: ${parseInt(d.xcsmPlnpnCnt).toLocaleString()}명`).join(' | ')}
                            </div>
                        </div>`;
                    }
                    
                    html += '</div>';
                    document.getElementById('life-insurance-result').innerHTML = html;
                    alert(`✅ ${Object.keys(companies).length}개 생명보험사 데이터 조회 완료!`);
                } else {
                    alert('❌ 데이터 조회 실패');
                }
            } catch (error) {
                alert('❌ 오류: ' + error.message);
                document.getElementById('api-response').textContent = error.message;
            }
        }

        // 실손보험 통계 조회
        async function getMedicalInsuranceStats() {
            const apiKey = document.getElementById('api-key').value;
            
            if (!apiKey) {
                alert('API 키를 입력해주세요!');
                return;
            }

            try {
                // 실손보험 API 엔드포인트
                const url = `https://apis.data.go.kr/1160100/service/GetMedicalInsuInfoService/getMedicalInsuInfo?serviceKey=${encodeURIComponent(apiKey)}&numOfRows=100&pageNo=1&resultType=json`;
                
                const response = await fetch(url);
                const data = await response.json();
                
                document.getElementById('api-response').textContent = JSON.stringify(data, null, 2);
                
                if (data.response && data.response.body && data.response.body.items) {
                    const items = data.response.body.items.item;
                    let html = '<div class="grid grid-cols-1 md:grid-cols-2 gap-4">';
                    
                    items.slice(0, 10).forEach(item => {
                        html += `<div class="border rounded-lg p-4">
                            <div class="font-bold text-sm">${item.mdclInsuTpNm || '실손보험'}</div>
                            <div class="text-xs text-gray-600 mt-2">
                                담보: ${item.cvrtItmNm || '-'}<br>
                                성별: ${item.gndrNm || '-'}<br>
                                연령: ${item.ageRngNm || '-'}
                            </div>
                        </div>`;
                    });
                    
                    html += '</div>';
                    document.getElementById('medical-insurance-result').innerHTML = html;
                    alert('✅ 실손보험 통계 조회 완료!');
                } else {
                    alert('❌ 데이터 조회 실패');
                }
            } catch (error) {
                alert('❌ 오류: ' + error.message);
                document.getElementById('api-response').textContent = error.message;
            }
        }
    </script>
</body>
</html>
