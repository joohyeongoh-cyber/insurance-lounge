<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ліҙн—ҳ м „л¬ёк°Җ лЎңк·ёмқё - ліҙн—ҳ LOUNGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-50 min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <i class="fas fa-user-tie text-purple-600 text-5xl mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800 mb-2">ліҙн—ҳ м „л¬ёк°Җ лЎңк·ёмқё</h1>
            <p class="text-gray-600">кі„м•ҪмӮ¬лЎҖ кҙҖлҰ¬ мӢңмҠӨн…ң</p>
        </div>

        <form id="fa-login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-user mr-2"></i>м•„мқҙл”” (мқҙл©”мқј)
                </label>
                <input 
                    type="email" 
                    id="fa-id" 
                    required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                    placeholder="л“ұлЎқлҗң мқҙл©”мқјмқ„ мһ…л Ҙн•ҳм„ёмҡ”"
                >
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">
                    <i class="fas fa-lock mr-2"></i>л№„л°ҖлІҲнҳё
                </label>
                <input 
                    type="password" 
                    id="fa-password" 
                    required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                    placeholder="л№„л°ҖлІҲнҳёлҘј мһ…л Ҙн•ҳм„ёмҡ”"
                >
            </div>

            <div id="error-message" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg text-sm">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="error-text"></span>
            </div>

            <button 
                type="submit" 
                class="w-full bg-purple-600 text-white py-3 rounded-lg font-semibold hover:bg-purple-700 transition shadow-lg"
            >
                <i class="fas fa-sign-in-alt mr-2"></i>лЎңк·ёмқё
            </button>
        </form>

        <div class="mt-6 text-center space-y-2">
            <a href="fa-apply.html" class="block text-sm text-purple-600 hover:text-purple-700">
                <i class="fas fa-user-plus mr-1"></i>м•„м§Ғ л“ұлЎқн•ҳм§Җ м•Ҡмңјм…ЁлӮҳмҡ”? ліҙн—ҳ м „л¬ёк°Җ мӢ мІӯн•ҳкё°
            </a>
            <a href="index.html" class="block text-sm text-gray-600 hover:text-gray-700">
                <i class="fas fa-arrow-left mr-1"></i>л©”мқёмңјлЎң лҸҢм•„к°Җкё°
            </a>
        </div>
    </div>

    <script>
        document.getElementById('fa-login-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const faId = document.getElementById('fa-id').value;
            const faPassword = document.getElementById('fa-password').value;
            const errorMessage = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');

            // Get FA profiles from localStorage
            const profiles = JSON.parse(localStorage.getItem('fa_profiles') || '[]');
            
            console.log('м „мІҙ н”„лЎңн•„:', profiles);
            console.log('мһ…л Ҙн•ң мқҙл©”мқј:', faId);
            console.log('мһ…л Ҙн•ң л№„л°ҖлІҲнҳё:', faPassword);
            
            // Find FA by email
            const faProfile = profiles.find(p => p.email === faId);

            if (!faProfile) {
                errorText.textContent = 'л“ұлЎқлҗҳм§Җ м•ҠмқҖ мқҙл©”мқјмһ…лӢҲлӢӨ. ліҙн—ҳ м „л¬ёк°Җ мӢ мІӯмқ„ лЁјм Җ н•ҙмЈјм„ёмҡ”.';
                errorMessage.classList.remove('hidden');
                console.log('н”„лЎңн•„мқ„ м°ҫмқ„ мҲҳ м—ҶмҠөлӢҲлӢӨ');
                return;
            }

            console.log('м°ҫмқҖ н”„лЎңн•„:', faProfile);
            console.log('м ҖмһҘлҗң л№„л°ҖлІҲнҳё:', faProfile.password);
            console.log('л№„л°ҖлІҲнҳё мқјм№ҳ м—¬л¶Җ:', faProfile.password === faPassword);

            // Check password (stored in profile)
            if (faProfile.password && faProfile.password === faPassword) {
                // Set FA session (localStorageлЎң ліҖкІҪн•ҳм—¬ нҺҳмқҙм§Җ мқҙлҸҷ мӢңм—җлҸ„ мң м§Җ)
                localStorage.setItem('fa_logged_in', 'true');
                localStorage.setItem('fa_user', JSON.stringify({
                    id: faProfile.id,
                    email: faProfile.email,
                    name: faProfile.name
                }));
                localStorage.setItem('login_time', new Date().toISOString());
                
                console.log('лЎңк·ёмқё м„ұкіө!');
                
                // мқҙм „ нҺҳмқҙм§ҖлЎң лҰ¬лӢӨмқҙл үнҠё (м—Ҷмңјл©ҙ лҢҖмӢңліҙл“ң)
                const returnUrl = sessionStorage.getItem('login_return_url') || 'fa-dashboard.html';
                sessionStorage.removeItem('login_return_url');
                window.location.href = returnUrl;
            } else {
                console.log('л№„л°ҖлІҲнҳё л¶Ҳмқјм№ҳ!');
                errorText.textContent = 'л№„л°ҖлІҲнҳёк°Җ мҳ¬л°”лҘҙм§Җ м•ҠмҠөлӢҲлӢӨ. (м ҖмһҘлҗң л№„л°ҖлІҲнҳё: ' + (faProfile.password ? 'мһҲмқҢ' : 'м—ҶмқҢ') + ')';
                errorMessage.classList.remove('hidden');
                document.getElementById('fa-password').value = '';
            }
        });
    </script>
</body>
</html>
